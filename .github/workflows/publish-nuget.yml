name: Publish NuGet Package

on:
    workflow_dispatch:
        inputs:
            git_tag:
                description: Optional git tag to build and publish. Leave empty to use the latest version tag.
                required: false
                type: string

permissions:
    contents: read

env:
    CONTROLS_PROJECT_PATH: src/SmoothScroll.Avalonia.Controls/SmoothScroll.Avalonia.Controls.csproj
    INTERACTION_PROJECT_PATH: src/SmoothScroll.Avalonia.Interaction/SmoothScroll.Avalonia.Interaction.csproj
    PACKAGE_OUTPUT_DIR: artifacts/nuget
    NUGET_SOURCE: https://api.nuget.org/v3/index.json

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  fetch-tags: true

            - name: Resolve tag and derive package version
              shell: bash
              run: |
                  set -euo pipefail

                  resolved_tag="${{ inputs.git_tag }}"

                  if [[ -z "$resolved_tag" ]]; then
                    resolved_tag="$(git tag --sort=-v:refname | head -n 1)"
                  fi

                  if [[ -z "$resolved_tag" ]]; then
                    echo "No git tags were found. Provide a tag manually or create a version tag first."
                    exit 1
                  fi

                  git rev-parse --verify "refs/tags/$resolved_tag" >/dev/null 2>&1

                  git checkout --force "$resolved_tag"

                  version="$resolved_tag"
                  version="${version#v}"

                  if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
                    echo "Tag '$resolved_tag' cannot be converted to a valid NuGet version."
                    exit 1
                  fi

                  echo "RESOLVED_TAG=$resolved_tag" >> "$GITHUB_ENV"
                  echo "PACKAGE_VERSION=$version" >> "$GITHUB_ENV"

            - name: Show resolved tag
              run: echo "Publishing from tag ${{ env.RESOLVED_TAG }} with package version ${{ env.PACKAGE_VERSION }}"

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: |
                      8.0.x
                      10.0.x

            - name: Restore Controls
              run: dotnet restore ${{ env.CONTROLS_PROJECT_PATH }}

            - name: Restore Interaction
              run: dotnet restore ${{ env.INTERACTION_PROJECT_PATH }}

            - name: Pack Controls
              run: >
                  dotnet pack ${{ env.CONTROLS_PROJECT_PATH }}
                  --configuration Release
                  --no-restore
                  -p:PackageVersion=${{ env.PACKAGE_VERSION }}
                  --output ${{ env.PACKAGE_OUTPUT_DIR }}

            - name: Pack Interaction
              run: >
                  dotnet pack ${{ env.INTERACTION_PROJECT_PATH }}
                  --configuration Release
                  --no-restore
                  -p:PackageVersion=${{ env.PACKAGE_VERSION }}
                  --output ${{ env.PACKAGE_OUTPUT_DIR }}

            - name: Upload package artifact
              uses: actions/upload-artifact@v4
              with:
                  name: SmoothScroll.Avalonia.${{ env.PACKAGE_VERSION }}
                  path: ${{ env.PACKAGE_OUTPUT_DIR }}/*.nupkg
                  if-no-files-found: error

            - name: Push to NuGet
              run: >
                  dotnet nuget push "${{ env.PACKAGE_OUTPUT_DIR }}/*.nupkg"
                  --source ${{ env.NUGET_SOURCE }}
                  --api-key ${{ secrets.NUGET_API_KEY }}
                  --skip-duplicate
